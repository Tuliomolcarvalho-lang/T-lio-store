<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Túlio Store</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--white:#fff;--border:#e4e4e9;--text:#1a1a2e;--muted:#8a8a9a;
  --light:#f0f0f5;--accent:#0066cc;
  --green:#1a9e5c;--green-bg:#e8f7f0;
  --red:#d63b3b;--red-bg:#fdeaea;
  --orange:#d97706;--orange-bg:#fef3cd;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --purple:#7c3aed;--purple-bg:#f3f0ff;
  --r:16px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --sh-lg:0 8px 32px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
nav{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{width:36px;height:36px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px}
.brand-name{font-size:16px;font-weight:800;letter-spacing:-.5px}
.brand-sub{font-size:11px;color:var(--muted)}
.page-tabs{display:flex;gap:2px;background:var(--light);border-radius:10px;padding:3px}
.ptab{padding:7px 14px;border-radius:8px;border:none;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;background:transparent;transition:all .18s;white-space:nowrap}
.ptab.active{background:var(--white);color:var(--text);box-shadow:var(--sh)}
.nav-right{display:flex;gap:6px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{background:#2d2d45;transform:translateY(-1px)}
.btn-ghost{background:var(--white);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--light)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f5c6c6}
.btn-trade{background:var(--orange-bg);color:var(--orange);border:1px solid #fde68a}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #a7f3d0}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px}
.page{display:none}.page.active{display:block}
main{max-width:1120px;margin:0 auto;padding:20px 16px 60px}
.month-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.month-bar label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.month-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--text);background:var(--white);cursor:pointer;outline:none}
.month-badge{padding:5px 12px;border-radius:20px;background:var(--accent);color:#fff;font-size:12px;font-weight:700}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.kpi-icon{font-size:16px}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-1px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
.kpi-accent{border-top:3px solid var(--accent)}.kpi-green{border-top:3px solid var(--green)}
.kpi-orange{border-top:3px solid var(--orange)}.kpi-gray{border-top:3px solid var(--muted)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s}
.pill:hover{border-color:var(--text);color:var(--text)}
.pill.active{background:var(--text);color:#fff;border-color:var(--text)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;animation:up .35s ease both}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-head{padding:15px 16px 11px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-model{font-size:14px;font-weight:700;letter-spacing:-.3px}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.bv{background:var(--green-bg);color:var(--green)}.bp{background:var(--blue-bg);color:var(--blue)}
.bu{background:var(--orange-bg);color:var(--orange)}.bm{background:var(--red-bg);color:var(--red)}
.bt{background:var(--purple-bg);color:var(--purple)}
.divider{height:1px;background:var(--border)}
.card-body{padding:11px 16px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:2px;font-weight:500}
.metric-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pos{color:var(--green)}.neg{color:var(--red)}
.bat-row{display:flex;align-items:center;gap:7px;margin-top:10px}
.bat-lbl{font-size:11px;color:var(--muted);min-width:40px;font-weight:500}
.bat-track{flex:1;height:4px;background:var(--light);border-radius:99px;overflow:hidden}
.bat-fill{height:100%;border-radius:99px}
.bg{background:var(--green)}.bo{background:var(--orange)}.br2{background:var(--red)}
.bat-pct{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:28px;text-align:right}
.hist-sec{background:var(--purple-bg);border-top:1px solid #ede9fe;padding:9px 16px}
.hist-lbl{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.hist-item{display:flex;gap:6px;font-size:12px;color:#5b3ea8;line-height:1.5;padding:2px 0;border-bottom:1px dashed #ded8f8}
.hist-item:last-child{border-bottom:none}
.hist-arr{color:var(--purple);font-weight:700;flex-shrink:0}
.notes-sec{background:var(--light);border-top:1px solid var(--border);padding:8px 16px}
.notes-txt{font-size:12px;color:var(--muted);font-style:italic}
.card-foot{padding:8px 16px 12px;display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.empty{grid-column:1/-1;text-align:center;padding:64px 24px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.stock-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.stock-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.stock-table{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{background:var(--light);padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.td-model{font-weight:700}.td-cost{font-family:'JetBrains Mono',monospace;font-weight:600}
.td-actions{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.stock-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.stock-thumb-placeholder{width:44px;height:44px;border-radius:8px;background:var(--light);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .18s}
.stock-thumb-placeholder:hover{border-color:var(--accent);background:var(--blue-bg)}
.card-photo{width:100%;max-height:320px;object-fit:contain;border-bottom:1px solid var(--border);cursor:pointer;background:#f5f5f7}
.card-photo-placeholder{width:100%;height:100px;background:var(--light);border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:background .18s}
.card-photo-placeholder:hover{background:#e8f0fe}
.card-photo-placeholder span{font-size:22px}
.card-photo-placeholder small{font-size:11px;color:var(--muted);font-weight:600}
.photo-input{display:none}
.photo-modal-img{width:100%;border-radius:12px;max-height:70vh;object-fit:contain;display:block}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .18s;background:var(--bg)}
.upload-zone:hover{border-color:var(--accent);background:var(--blue-bg)}
.upload-zone span{font-size:28px;display:block;margin-bottom:6px}
.upload-zone small{font-size:12px;color:var(--muted);font-weight:500}
.overlay{position:fixed;inset:0;background:rgba(10,10,20,.42);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-lg);transform:scale(.96) translateY(10px);transition:transform .25s}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-head{padding:18px 22px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:10}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.5px}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--light);border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-body{padding:16px 22px 22px}
.tabs{display:flex;gap:3px;background:var(--light);border-radius:10px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:7px;border-radius:8px;border:none;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;background:transparent;transition:all .18s}
.tab.active{background:var(--white);color:var(--text);box-shadow:var(--sh)}
.tp{display:none}.tp.active{display:block}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .18s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.field textarea{resize:vertical;min-height:60px}
.field select option{background:#fff}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.note{border-radius:10px;padding:9px 12px;font-size:12px;margin-bottom:12px;line-height:1.5}
.note-blue{background:var(--blue-bg);border:1px solid #bfdbfe;color:var(--blue)}
.note-orange{background:var(--orange-bg);border:1px solid #fde68a;color:var(--orange)}
.note-green{background:var(--green-bg);border:1px solid #a7f3d0;color:var(--green)}
.cost-preview{background:var(--light);border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.cost-preview span{font-size:12px;color:var(--muted);font-weight:500}
.cost-preview strong{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text)}
.modal-foot{display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border);margin-top:14px}
.modal-foot .btn{flex:1;justify-content:center}
.hist-entry{display:flex;gap:7px;background:var(--purple-bg);border-radius:8px;padding:7px 10px;margin-bottom:5px;font-size:12px;color:#5b3ea8}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--white);border:1px solid var(--border);border-radius:24px;box-shadow:var(--sh-lg);padding:36px 32px;width:100%;max-width:360px;text-align:center}
.login-icon{width:56px;height:56px;background:var(--text);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.login-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.login-field{position:relative;margin-bottom:12px}
.login-field input{width:100%;padding:12px 40px 12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Sora',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .18s;text-align:center;letter-spacing:2px}
.login-field input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.login-btn{width:100%;padding:13px;background:var(--text);color:#fff;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;margin-top:4px}
.login-btn:hover{background:#2d2d45;transform:translateY(-1px)}
.login-err{color:var(--red);font-size:12px;font-weight:600;margin-top:8px;min-height:18px}
@media(max-width:600px){
  .kpis{grid-template-columns:1fr 1fr}
  .page-tabs .ptab{padding:6px 10px;font-size:11px}
  .nav-right .btn span{display:none}
}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🍎</div>
    <div class="login-title">Túlio Store</div>
    <div class="login-sub">Digite a senha para acessar</div>
    <div class="login-field">
      <input type="password" id="login-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>
<nav>
  <div class="brand">
    <div class="brand-icon">🍎</div>
    <div>
      <div class="brand-name">Túlio Store</div>
      <div class="brand-sub">Controle de Vendas</div>
    </div>
  </div>
  <div class="page-tabs">
    <button class="ptab active" onclick="goPage('vendas',this)">📊 Vendas</button>
    <button class="ptab" onclick="goPage('estoque',this)">📦 Estoque</button>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <div class="nav-right" id="nav-right"></div>
    <button class="btn btn-ghost btn-sm" onclick="resetDB()" title="Resetar dados" style="color:var(--muted);font-size:16px;padding:6px 9px">↺</button>
  </div>
</nav>
<main>
  <div class="page active" id="page-vendas">
    <div class="month-bar">
      <label>Período</label>
      <select class="month-select" id="month-sel" onchange="render()"></select>
      <span class="month-badge" id="month-badge"></span>
    </div>
    <div class="kpis" id="kpis"></div>
    <div class="toolbar">
      <div class="filters">
        <button class="pill active" onclick="setFilter('todos',this)">Todos</button>
        <button class="pill" onclick="setFilter('VENDIDO',this)">✓ Vendidos</button>
        <button class="pill" onclick="setFilter('PRONTA ENTREGA',this)">● Estoque</button>
        <button class="pill" onclick="setFilter('EM USO',this)">⟳ Em Uso</button>
        <button class="pill" onclick="setFilter('MANUTENÇÃO',this)">⚙ Manutenção</button>
        <button class="pill" onclick="setFilter('TROCA',this)">⇄ Trocas</button>
      </div>
      <span id="count-lbl" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div class="cards" id="cards"></div>
  </div>
  <div class="page" id="page-estoque">
    <div class="stock-header">
      <div>
        <div class="stock-title">📦 Estoque</div>
        <div style="font-size:13px;color:var(--muted);margin-top:3px">Aparelhos disponíveis para venda ou troca</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-trade" onclick="openTrade()">⇄ Troca</button>
        <button class="btn btn-primary" onclick="openNewStock()">+ Cadastrar</button>
      </div>
    </div>
    <div class="stock-table">
      <table>
        <thead><tr>
          <th>Foto</th><th>Modelo</th><th>Cor</th><th>Bat.</th><th>Origem</th>
          <th>Custo Total</th><th>Venda</th><th>Lucro</th>
          <th style="text-align:right">Ações</th>
        </tr></thead>
        <tbody id="stock-tbody"></tbody>
      </table>
    </div>
  </div>
</main>
<div class="toast" id="toast">✓ Salvo automaticamente</div>
<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="m-title">…</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>
<script>
// ─── SENHA ────────────────────────────────────────────────────────────────────
const SENHA='Tulio4865';
let autenticado=false;
function doLogin(){
  const val=document.getElementById('login-input').value;
  if(val===SENHA){
    autenticado=true;
    document.getElementById('login-screen').style.display='none';
    init();
  }else{
    const err=document.getElementById('login-err');
    err.textContent='Senha incorreta. Tente novamente.';
    document.getElementById('login-input').value='';
    document.getElementById('login-input').focus();
    setTimeout(()=>err.textContent='',2500);
  }
}
function pedirSenha(acao){
  const s=prompt('Digite a senha para confirmar:');
  if(s===SENHA){acao();return true;}
  alert('Senha incorreta!');return false;
}
// ─── DADOS PADRÃO (só usados na primeira vez) ─────────────────────────────────
const DEFAULT_DB=[
  {id:2, modelo:"iPhone 13 Pro Max", cor:"Branco",           bat:95,  status:"VENDIDO",        venda:3400, custo:2690, reparo:0,  mes:"Dezembro 2025", origem:"Compra", obs:"", hist:[]},
  {id:6, modelo:"iPhone 14",         cor:"Preto",            bat:100, status:"VENDIDO",        venda:2500, custo:2137, reparo:0,  mes:"Dezembro 2025", origem:"Compra", obs:"", hist:[]},
  {id:7, modelo:"iPhone 14 Plus",    cor:"Preto",            bat:87,  status:"VENDIDO",        venda:2500, custo:1800, reparo:0,  mes:"Março 2026",    origem:"Compra", obs:"", hist:[]},
  {id:13,modelo:"iPhone 14",         cor:"Branco",           bat:85,  status:"VENDIDO",        venda:2250, custo:2000, reparo:0,  mes:"Março 2026",    origem:"Compra", obs:"", hist:["Vendido em 23/03/2026"]},
  {id:8, modelo:"iPhone 14 Plus",    cor:"Vermelho",         bat:83,  status:"TROCA",          venda:null, custo:1900, reparo:0,  mes:"Março 2026",    origem:"Compra", obs:"", hist:["Entregue na troca pelo iPhone 11 Pro — volta de R$ 1.500 — Março 2026"]},
  {id:9, modelo:"iPhone 12",         cor:"Branco",           bat:null,status:"MANUTENÇÃO",     venda:null, custo:null, reparo:0,  mes:"",              origem:"Compra", obs:"Em manutenção", hist:[]},

async function loadDB(){

let db = [];
let nextId = 14;

let cardFilter='todos',editId=null,currentPage='vendas';
const R=n=>(n!=null&&n!==''&&Number(n)>0)?'R$ '+Number(n).toLocaleString('pt-BR'):'—';
const ct=v=>(v.custo||0)+(v.reparo||0);
const lucro=v=>(v.venda&&v.custo!=null)?v.venda-ct(v):null;
const today=()=>new Date().toLocaleDateString('pt-BR');
const MONTHS_ORDER=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
function allMonths(){const s=new Set();db.forEach(v=>{if(v.mes)s.add(v.mes)});return[...s].sort((a,b)=>{const[ma,ya]=a.split(' '),[mb,yb]=b.split(' ');return(ya-yb)||MONTHS_ORDER.indexOf(ma)-MONTHS_ORDER.indexOf(mb)})}
function currentMonth(){const d=new Date();return MONTHS_ORDER[d.getMonth()]+' '+d.getFullYear()}
const BADGE={'VENDIDO':['bv','✓'],'PRONTA ENTREGA':['bp','●'],'EM USO':['bu','⟳'],'MANUTENÇÃO':['bm','⚙'],'TROCA':['bt','⇄']};

function buildMonthSel(){
  const sel=document.getElementById('month-sel');
  const prev=sel.value;
  const months=allMonths();
  const cm=currentMonth();
  sel.innerHTML=`<option value="todos">Todos os períodos</option>`+months.map(m=>`<option value="${m}">${m}</option>`).join('');
  if(prev&&months.includes(prev))sel.value=prev;
  else if(months.includes(cm))sel.value=cm;
  else if(months.length)sel.value=months[months.length-1];
  else sel.value='todos';
}
function selectedMonth(){return document.getElementById('month-sel').value}

function renderKPIs(){
  const m=selectedMonth();
  const pool=m==='todos'?db:db.filter(v=>v.mes===m);
  const sold=pool.filter(v=>v.status==='VENDIDO'&&v.venda>0);
  const tv=sold.reduce((s,v)=>s+(v.venda||0),0);
  const tl=sold.reduce((s,v)=>s+(lucro(v)||0),0);
  const est=db.filter(v=>v.status==='PRONTA ENTREGA').length;
  const mg=tv>0?((tl/tv)*100).toFixed(1):0;
  document.getElementById('month-badge').textContent=m==='todos'?'Geral':m;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi kpi-accent"><div class="kpi-top"><div class="kpi-label">Total Vendido</div><div class="kpi-icon">💰</div></div><div class="kpi-val">${R(tv)}</div><div class="kpi-sub">${sold.length} venda${sold.length!==1?'s':''}</div></div>
    <div class="kpi kpi-green"><div class="kpi-top"><div class="kpi-label">Lucro</div><div class="kpi-icon">📈</div></div><div class="kpi-val" style="color:${tl>=0?'var(--green)':'var(--red)'}">${R(tl)}</div><div class="kpi-sub">Margem ${mg}%</div></div>
    <div class="kpi kpi-orange"><div class="kpi-top"><div class="kpi-label">Em Estoque</div><div class="kpi-icon">📦</div></div><div class="kpi-val" style="color:var(--orange)">${est}</div><div class="kpi-sub">Pronta entrega</div></div>
    <div class="kpi kpi-gray"><div class="kpi-top"><div class="kpi-label">Aparelhos</div><div class="kpi-icon">📱</div></div><div class="kpi-val">${pool.length}</div><div class="kpi-sub">${pool.filter(v=>v.status==='TROCA').length} trocas · ${pool.filter(v=>v.status==='MANUTENÇÃO').length} manut.</div></div>`;
}

function renderCards(){
  const m=selectedMonth();

  document.getElementById('cards').innerHTML=list.map((v,i)=>{
    const l=lucro(v),lc=l!=null?(l>=0?'pos':'neg'):'',mg=l!=null&&v.venda>0?((l/v.venda)*100).toFixed(1)+'%':'—';
    const[bc,bi]=BADGE[v.status]||['bp','●'],ctt=ct(v);
    const bat=v.bat?`<div class="bat-row"><span class="bat-lbl">Bateria</span><div class="bat-track"><div class="bat-fill ${v.bat>=90?'bg':v.bat>=80?'bo':'br2'}" style="width:${v.bat}%"></div></div><span class="bat-pct" style="color:${v.bat>=90?'var(--green)':v.bat>=80?'var(--orange)':'var(--red)'}">${v.bat}%</span></div>`:'';

      :(v.status==='PRONTA ENTREGA'?`<div class="card-photo-placeholder" onclick="uploadFoto(${v.id})"><span>📷</span><small>Adicionar foto</small></div>`:'');
    return`<div class="card" style="animation-delay:${i*.04}s">
      ${fotoHtml}
      <div class="card-head"><div><div class="card-model">${v.modelo}</div><div class="card-sub">${v.cor}${v.mes?' · '+v.mes:''}${v.origem?' · '+v.origem:''}</div></div><span class="badge ${bc}">${bi} ${v.status}</span></div>

        <div><div class="metric-label">Valor de Venda</div><div class="metric-val">${R(v.venda)}</div></div>

        <div><div class="metric-label">Lucro</div><div class="metric-val ${lc}">${l!=null?R(l):'—'}</div></div>
        <div><div class="metric-label">Margem</div><div class="metric-val ${lc}">${mg}</div></div>
      </div>${bat}</div>
      ${hist}${notes}
      <div class="divider"></div>
      <div class="card-foot">
        ${v.status==='PRONTA ENTREGA'?`<button class="btn btn-green btn-sm" onclick="openVendaRapida(${v.id})">✓ Vender</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${v.id})">✏ Editar</button>
        <button class="btn btn-ghost btn-sm" onclick="openAddGasto(${v.id})">+ Gasto</button>
        <button class="btn btn-ghost btn-sm" onclick="promptNota(${v.id})">+ Nota</button>
        <button class="btn btn-danger btn-sm" onclick="del(${v.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function preencheVenda(){
  const id=parseInt(document.getElementById('ns-id').value);
  const preview=document.getElementById('ns-preview');
  if(!id){preview.style.display='none';return;}
  const v=db.find(x=>x.id===id);
  if(!v){preview.style.display='none';return;}
  preview.style.display='block';
  document.getElementById('ns-custo').textContent=R(ct(v));
  document.getElementById('ns-venda').value=v.venda||'';
  updNsLucro();
}
function updNsLucro(){
  const id=parseInt(document.getElementById('ns-id')?.value)||0;
  const venda=parseFloat(document.getElementById('ns-venda')?.value)||0;
  const el=document.getElementById('ns-lucro');
  if(!el)return;
  const v=db.find(x=>x.id===id);
  if(!v||!venda){el.textContent='—';return;}
  const lucroVal=venda-ct(v);
  el.textContent='R$ '+lucroVal.toLocaleString('pt-BR');
  el.style.color=lucroVal>=0?'var(--green)':'var(--red)';
  el.closest('div').style.background=lucroVal>=0?'var(--green-bg)':'var(--red-bg)';
  el.closest('div').style.borderColor=lucroVal>=0?'#a7f3d0':'#f5c6c6';
}
async function confirmarVendaEstoque(){
  const id=parseInt(document.getElementById('ns-id')?.value)||0;
  const venda=parseFloat(document.getElementById('ns-venda')?.value)||0;
  if(!id){alert('Selecione um aparelho!');return;}
  if(!venda||venda<=0){alert('Informe o valor de venda!');return;}
  const v=db.find(x=>x.id===id);
  if(!v){alert('Aparelho não encontrado!');return;}
  const mes=document.getElementById('ns-mes').value.trim()||currentMonth();
  const obs=document.getElementById('ns-obs').value.trim();
  v.status='VENDIDO';
  v.venda=venda;
  v.mes=mes;
  if(obs)v.obs=obs;
  v.hist.push(`Vendido por ${R(venda)} em ${today()}`);
  closeModal();await saveDB();buildMonthSel();render();if(currentPage==='estoque')renderStock();
}
function openEdit(id){editId=id;openModal('✏ Editar Aparelho',formHtml(db.find(v=>v.id===id)))}
async function saveForm(){
  const modelo=document.getElementById('f-modelo').value.trim();
  if(!modelo){alert('Informe o modelo!');return}
  const nota=(document.getElementById('f-nota')||{}).value?.trim();
  if(editId){
    const v=db.find(x=>x.id===editId);
    v.modelo=modelo;v.cor=document.getElementById('f-cor').value.trim()||'—';
    v.bat=parseInt(document.getElementById('f-bat').value)||null;
    v.status=document.getElementById('f-status').value;v.origem=document.getElementById('f-origem').value;
    v.obs=document.getElementById('f-obs').value.trim();v.venda=parseFloat(document.getElementById('f-venda').value)||null;
    v.custo=parseFloat(document.getElementById('f-custo').value)||null;v.reparo=parseFloat(document.getElementById('f-reparo').value)||0;
    v.mes=document.getElementById('f-mes').value.trim();if(nota)v.hist.push(nota+' — '+today());
  }else{
    db.unshift({id:nextId++,modelo,cor:document.getElementById('f-cor').value.trim()||'—',bat:parseInt(document.getElementById('f-bat').value)||null,
      status:document.getElementById('f-status').value,origem:document.getElementById('f-origem').value,obs:document.getElementById('f-obs').value.trim(),
      venda:parseFloat(document.getElementById('f-venda').value)||null,custo:parseFloat(document.getElementById('f-custo').value)||null,
      reparo:parseFloat(document.getElementById('f-reparo').value)||0,mes:document.getElementById('f-mes').value.trim(),hist:nota?[nota]:[]});
  }
  closeModal();await saveDB();buildMonthSel();render();
}

    <div class="field"><label>Modelo *</label><input id="s-modelo" placeholder="Ex: iPhone 13 Pro"></div>
    <div class="fr2"><div class="field"><label>Cor</label><input id="s-cor" placeholder="Azul Sierra"></div><div class="field"><label>Bateria %</label><input id="s-bat" type="number" min="0" max="100" placeholder="89"></div></div>
    <div class="fr2"><div class="field"><label>Origem</label><select id="s-origem">${orOpts}</select></div><div class="field"><label>Mês de entrada</label><input id="s-mes" placeholder="Ex: Abril 2026"></div></div>
    <div class="fr2"><div class="field"><label>Custo de Compra (R$)</label><input id="s-custo" type="number" placeholder="0" oninput="updCP()"></div><div class="field"><label>Gastos c/ Reparo (R$)</label><input id="s-reparo" type="number" placeholder="0" value="0" oninput="updCP()"></div></div>
    <div class="cost-preview"><span>Custo Total</span><strong id="cp-val">R$ 0</strong></div>
    <div class="field"><label>Venda Pretendida (R$)</label><input id="s-venda" type="number" placeholder="1500"></div>
    <div class="field"><label>Observações</label><textarea id="s-obs" placeholder="Ex: IMEI ok, sem arranhões..."></textarea></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStock()">Cadastrar</button></div>`);
}
function updCP(){const c=parseFloat(document.getElementById('s-custo')?.value)||0,r=parseFloat(document.getElementById('s-reparo')?.value)||0,el=document.getElementById('cp-val');if(el)el.textContent='R$ '+(c+r).toLocaleString('pt-BR')}
async function saveStock(){
  const modelo=document.getElementById('s-modelo').value.trim();if(!modelo){alert('Informe o modelo!');return}
  db.unshift({id:nextId++,modelo,cor:document.getElementById('s-cor').value.trim()||'—',bat:parseInt(document.getElementById('s-bat').value)||null,
    status:'PRONTA ENTREGA',origem:document.getElementById('s-origem').value,obs:document.getElementById('s-obs').value.trim(),
    venda:parseFloat(document.getElementById('s-venda').value)||null,custo:parseFloat(document.getElementById('s-custo').value)||0,
    reparo:parseFloat(document.getElementById('s-reparo').value)||0,mes:document.getElementById('s-mes').value.trim(),hist:[]});
  closeModal();await saveDB();buildMonthSel();render();renderStock();
}

function openAddGasto(id){
  const v=db.find(x=>x.id===id);
  openModal(`+ Gasto — ${v.modelo}`,`
    <div class="note note-orange">⚙ Será somado ao custo total automaticamente.</div>
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--light);border-radius:10px;padding:11px 13px;margin-bottom:12px">
      <span style="font-size:12px;color:var(--muted);font-weight:500">Custo atual</span>
      <strong style="font-family:'JetBrains Mono',monospace;font-size:15px">${R(ct(v))}</strong>
    </div>
    <div class="field"><label>Valor do Gasto (R$) *</label><input id="g-val" type="number" placeholder="Ex: 150"></div>
    <div class="field"><label>Descrição</label><input id="g-desc" placeholder="Ex: Troca de tela..."></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveGasto(${id})">Adicionar</button></div>`);
}
async function saveGasto(id){
  const val=parseFloat(document.getElementById('g-val').value);
  if(!val||val<=0){alert('Informe um valor válido!');return}
  const v=db.find(x=>x.id===id);
  v.reparo=(v.reparo||0)+val;
  v.hist.push((document.getElementById('g-desc').value.trim()||'Gasto com reparo')+': '+R(val)+' — '+today());
  closeModal();await saveDB();render();if(currentPage==='estoque')renderStock();
}

function tradeFormHtml(preselect=null){
  const opts=db.filter(v=>v.status!=='VENDIDO'&&v.status!=='TROCA').map(v=>`<option value="${v.id}"${v.id===preselect?' selected':''}>${v.modelo} ${v.cor}</option>`).join('');
  return`<div class="note note-orange">⇄ O entregue vira <strong>Troca</strong>. O recebido entra como <strong>Pronta Entrega</strong>.</div>
    <div class="field"><label>Aparelho Entregue *</label><select id="t-from" onchange="updTC()"><option value="">Selecionar...</option>${opts}</select></div>
    <div class="field"><label>Aparelho Recebido *</label><input id="t-rec" placeholder="Ex: iPhone 11 Pro"></div>
    <div class="fr2"><div class="field"><label>Cor</label><input id="t-cor" placeholder="Cinza Sideral"></div><div class="field"><label>Bateria %</label><input id="t-bat" type="number" placeholder="85"></div></div>
    <div class="fr2"><div class="field"><label>Volta recebida (R$)</label><input id="t-volta" type="number" placeholder="1500" oninput="updTC()"></div><div class="field"><label>Gastos no recebido (R$)</label><input id="t-gasto" type="number" placeholder="0" value="0" oninput="updTC()"></div></div>
    <div class="cost-preview"><span>Custo do Recebido <span style="font-size:10px">(custo entregue − volta + reparos)</span></span><strong id="tcp-val">—</strong></div>
    <div class="field"><label>Venda Pretendida (R$)</label><input id="t-venda" type="number" placeholder="1300"></div>
    <div class="field"><label>Mês</label><input id="t-mes" placeholder="Ex: Março 2026"></div>
    <div class="field"><label>Observações</label><textarea id="t-obs" placeholder="Ex: tela + bateria novas"></textarea></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-trade" onclick="saveTrade()">⇄ Confirmar Troca</button></div>`;
}
function updTC(){
  const fromId=parseInt(document.getElementById('t-from')?.value)||0,volta=parseFloat(document.getElementById('t-volta')?.value)||0,gasto=parseFloat(document.getElementById('t-gasto')?.value)||0,el=document.getElementById('tcp-val');
  if(!el)return;if(!fromId){el.textContent='Selecione o aparelho';return}
  const from=db.find(v=>v.id===fromId);if(!from){el.textContent='—';return}
  const total=ct(from)-volta+gasto;el.textContent='R$ '+total.toLocaleString('pt-BR');el.style.color=total<=0?'var(--green)':'var(--text)';
}
function openTrade(){openModal('⇄ Registrar Troca',tradeFormHtml())}
function openTradeFrom(id){openModal('⇄ Registrar Troca',tradeFormHtml(id))}
async function saveTrade(){
  const fromId=parseInt(document.getElementById('t-from').value),rec=document.getElementById('t-rec').value.trim();
  if(!fromId||!rec){alert('Preencha o aparelho entregue e o recebido!');return}
  const volta=parseFloat(document.getElementById('t-volta').value)||0,gasto=parseFloat(document.getElementById('t-gasto').value)||0;
  const venda=parseFloat(document.getElementById('t-venda').value)||null,cor=document.getElementById('t-cor').value.trim()||'—';
  const bat=parseInt(document.getElementById('t-bat').value)||null,obs=document.getElementById('t-obs').value.trim(),mes=document.getElementById('t-mes').value.trim();
  const from=db.find(v=>v.id===fromId),custoEntregue=ct(from),custoNovo=custoEntregue-volta+gasto;
  from.status='TROCA';from.mes=mes||from.mes;
  from.hist.push(`Entregue na troca pelo ${rec}${volta>0?' — volta de R$ '+volta.toLocaleString('pt-BR'):''}  — ${today()}`);
  const novoHist=[`Recebido na troca pelo ${from.modelo} ${from.cor}${volta>0?' — volta de R$ '+volta.toLocaleString('pt-BR'):''}  — ${today()}`,
    `Custo: R$ ${custoEntregue.toLocaleString('pt-BR')} (${from.modelo}) − R$ ${volta.toLocaleString('pt-BR')} (volta)${gasto>0?' + R$ '+gasto.toLocaleString('pt-BR')+' (reparos)':''} = R$ ${custoNovo.toLocaleString('pt-BR')}`];
  if(gasto>0)novoHist.push(`Gastos com reparo: R$ ${gasto.toLocaleString('pt-BR')}`);
  db.unshift({id:nextId++,modelo:rec,cor,bat,status:'PRONTA ENTREGA',venda,custo:custoNovo,reparo:0,mes:mes||'',origem:'Troca',obs:obs||(gasto>0?`R$ ${gasto.toLocaleString('pt-BR')} em reparos`:''),hist:novoHist});
  closeModal();await saveDB();buildMonthSel();render();if(currentPage==='estoque')renderStock();
}

async function del(id){pedirSenha(async()=>{if(confirm('Remover este aparelho?')){db=db.filter(v=>v.id!==id);await saveDB();buildMonthSel();render();if(currentPage==='estoque')renderStock()}})};

function openVendaRapida(id){
  const v=db.find(x=>x.id===id);if(!v)return;
  openModal(`✓ Vender — ${v.modelo}`,`
    <div class="note note-green">💰 Registrar venda deste aparelho.</div>
    <div style="background:var(--light);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--muted);font-weight:500">Custo Total</span>
      <strong style="font-family:'JetBrains Mono',monospace;font-size:15px">${R(ct(v))}</strong>
    </div>
    <div class="field">
      <label>Valor de Venda (R$) *</label>
      <input id="vr-venda" type="number" placeholder="Ex: 3500" value="${v.venda||''}" oninput="updVrLucro(${id})">
    </div>
    <div style="background:var(--green-bg);border:1px solid #a7f3d0;border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center" id="vr-lucro-box">
      <span style="font-size:12px;color:var(--green);font-weight:500">Lucro estimado</span>
      <strong id="vr-lucro" style="font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--green)">${v.venda?'R$ '+(v.venda-ct(v)).toLocaleString('pt-BR'):'—'}</strong>
    </div>
    <div class="field">
      <label>Mês da Venda</label>
      <input id="vr-mes" placeholder="Ex: Abril 2026" value="${currentMonth()}">
    </div>
    <div class="field">
      <label>Observações</label>
      <textarea id="vr-obs" placeholder="Ex: Vendido para cliente X..."></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmarVendaRapida(${id})">✓ Confirmar Venda</button>
    </div>`);
}
function updVrLucro(id){
  const v=db.find(x=>x.id===id);if(!v)return;
  const venda=parseFloat(document.getElementById('vr-venda')?.value)||0;
  const el=document.getElementById('vr-lucro');
  const box=document.getElementById('vr-lucro-box');
  if(!el)return;
  if(!venda){el.textContent='—';return;}
  const lucroVal=venda-ct(v);
  el.textContent='R$ '+lucroVal.toLocaleString('pt-BR');
  el.style.color=lucroVal>=0?'var(--green)':'var(--red)';
  box.style.background=lucroVal>=0?'var(--green-bg)':'var(--red-bg)';
  box.style.borderColor=lucroVal>=0?'#a7f3d0':'#f5c6c6';
}
async function confirmarVendaRapida(id){
  const venda=parseFloat(document.getElementById('vr-venda')?.value)||0;
  if(!venda||venda<=0){alert('Informe o valor de venda!');return;}
  const v=db.find(x=>x.id===id);if(!v)return;
  const mes=document.getElementById('vr-mes').value.trim()||currentMonth();
  const obs=document.getElementById('vr-obs').value.trim();
  v.status='VENDIDO';v.venda=venda;v.mes=mes;
  if(obs)v.obs=obs;
  v.hist.push(`Vendido por ${R(venda)} em ${today()}`);
  closeModal();await saveDB();buildMonthSel();render();if(currentPage==='estoque')renderStock();
}
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const v=db.find(x=>x.id===id);
      if(!v)return;
      v.foto=ev.target.result;
      await saveDB();render();if(currentPage==='estoque')renderStock();
      showToast('📷 Foto salva!');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
function verFoto(id){
  const v=db.find(x=>x.id===id);if(!v||!v.foto)return;
  openModal(`📷 ${v.modelo}`,`
    <img class="photo-modal-img" src="${v.foto}">
    <div class="modal-foot" style="margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn btn-danger" onclick="removerFoto(${id})">🗑 Remover</button>
      <button class="btn btn-primary" onclick="closeModal();uploadFoto(${id})">📷 Trocar</button>
    </div>`);
}
async function removerFoto(id){
  const v=db.find(x=>x.id===id);if(!v)return;
  delete v.foto;closeModal();
  await saveDB();render();if(currentPage==='estoque')renderStock();
  showToast('Foto removida');
}
async function promptNota(id){const nota=prompt('Adicionar nota ao histórico:');if(!nota)return;db.find(v=>v.id===id).hist.push(nota+' — '+today());await saveDB();render()}
function render(){renderKPIs();renderCards()}

async function init(){
  showToast('⏳ Carregando dados...');
  const loaded = await loadDB();
  if(!loaded){
    db = JSON.parse(JSON.stringify(DEFAULT_DB));
    nextId = 14;
    await saveDB();
  }
  buildMonthSel();updateNavRight();render();
}
// init só roda após login
</script>
