<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Túlio Store — Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--white:#fff;--border:#e4e4e9;--text:#1a1a2e;--muted:#8a8a9a;
  --light:#f0f0f5;--green:#1a9e5c;--green-bg:#e8f7f0;
  --accent:#0066cc;--blue-bg:#eff6ff;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --sh-lg:0 8px 32px rgba(0,0,0,.13);
}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* NAV */
nav{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px}
.brand-name{font-size:16px;font-weight:800;letter-spacing:-.5px}
.brand-sub{font-size:11px;color:var(--muted)}
.nav-badge{background:var(--green-bg);color:var(--green);border:1px solid #a7f3d0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:24px 16px 80px}

/* HERO */
.hero{text-align:center;padding:32px 16px 28px;margin-bottom:8px}
.hero-title{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--muted);max-width:340px;margin:0 auto}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:18px;box-shadow:var(--sh);overflow:hidden;transition:transform .2s,box-shadow .2s;animation:up .35s ease both}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* FOTO */
.card-foto{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f0f0f5;display:block}
.card-foto-placeholder{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#f0f0f5,#e4e4e9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.card-foto-placeholder span{font-size:36px;opacity:.35}
.card-foto-placeholder small{font-size:11px;color:var(--muted);font-weight:600}

/* INFO */
.card-body{padding:14px 16px 16px}
.card-modelo{font-size:16px;font-weight:800;letter-spacing:-.4px;margin-bottom:2px}
.card-cor{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:12px}
.card-preco{font-size:22px;font-weight:800;letter-spacing:-1px;color:var(--text);margin-bottom:12px}
.card-preco span{font-size:13px;font-weight:600;color:var(--muted)}

/* BATERIA — só aparece se >= 80 */
.bat-chip{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);border:1px solid #a7f3d0;color:var(--green);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:14px}
.bat-icon{font-size:13px}

/* BOTÃO WHATSAPP */
.btn-wpp{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .18s}
.btn-wpp:hover{background:#1ebe5a;transform:translateY(-1px)}
.btn-wpp svg{width:18px;height:18px;fill:#fff;flex-shrink:0}

/* VAZIO / LOADING */
.estado{text-align:center;padding:80px 24px;color:var(--muted)}
.estado-icon{font-size:52px;margin-bottom:14px;opacity:.3}
.estado-txt{font-size:15px;font-weight:600}
.estado-sub{font-size:13px;margin-top:6px;opacity:.7}

/* FOOTER */
footer{text-align:center;padding:32px 16px 20px;font-size:12px;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none;font-weight:600}

/* LOADING SKELETON */
.skeleton{background:linear-gradient(90deg,#f0f0f5 25%,#e4e4e9 50%,#f0f0f5 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-foto{width:100%;aspect-ratio:4/3;border-radius:0}
.sk-linha{height:14px;margin:8px 16px}
.sk-linha.lg{height:20px;width:60%}
.sk-linha.sm{height:12px;width:40%}
.sk-btn{height:42px;margin:12px 16px 16px;border-radius:12px}

@media(max-width:480px){
  .hero-title{font-size:22px}
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .card-modelo{font-size:14px}
  .card-preco{font-size:18px}
  .btn-wpp{font-size:12px;padding:10px}
}
@media(max-width:340px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="brand">
    <div class="brand-icon">🍎</div>
    <div>
      <div class="brand-name">Túlio Store</div>
      <div class="brand-sub">iPhones Seminovos</div>
    </div>
  </div>
  <div class="nav-badge" id="nav-badge">Carregando...</div>
</nav>

<main>
  <div class="hero">
    <div class="hero-title">📱 Estoque Disponível</div>
    <div class="hero-sub">Todos os aparelhos prontos para entrega. Clique em qualquer um para falar no WhatsApp.</div>
  </div>

  <div class="grid" id="grid">
    <!-- Skeletons de loading -->
    <div class="card"><div class="skeleton sk-foto"></div><div class="skeleton sk-linha lg"></div><div class="skeleton sk-linha sm"></div><div class="skeleton sk-btn"></div></div>
    <div class="card"><div class="skeleton sk-foto"></div><div class="skeleton sk-linha lg"></div><div class="skeleton sk-linha sm"></div><div class="skeleton sk-btn"></div></div>
    <div class="card"><div class="skeleton sk-foto"></div><div class="skeleton sk-linha lg"></div><div class="skeleton sk-linha sm"></div><div class="skeleton sk-btn"></div></div>
  </div>
</main>

<footer>
  Atualizado em tempo real · <a href="https://wa.me/55SEUNUMERO" target="_blank">Fale com a Túlio Store</a>
</footer>

<script>
const SUPABASE_URL = 'https://uokpsgoxkiylppfolodv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVva3BzZ294a2l5bHBwZm9sb2R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzgxMjAsImV4cCI6MjA5MTI1NDEyMH0.L7M8UZulGuWkz0GqpYMh3LzeBZ3f3WY2M3yCj3zSDf4';
const WPP_NUMERO = '55SEUNUMERO'; // ← troque pelo seu número com DDI+DDD, ex: 5511999999999

async function loadEstoque(){
  try{
    const res = await fetch(SUPABASE_URL+'/rest/v1/aparelhos?id=eq.1&select=data',{
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    if(!res.ok) throw new Error('Erro na API');
    const rows = await res.json();
    if(rows.length && rows[0].data){
      return rows[0].data.filter(v=>v.status==='PRONTA ENTREGA');
    }
  }catch(e){ console.warn('Erro ao carregar:', e); }
  return [];
}

function R(n){ return n!=null&&Number(n)>0 ? 'R$ '+Number(n).toLocaleString('pt-BR') : null; }

function wppLink(aparelho){
  const preco = R(aparelho.venda) || 'a consultar';
  const bat   = aparelho.bat >= 80 ? ` | Bateria ${aparelho.bat}%` : '';
  const msg   = `Olá! Vi no site e tenho interesse no *${aparelho.modelo} ${aparelho.cor}* — ${preco}${bat}. Ainda está disponível?`;
  return `https://wa.me/${WPP_NUMERO}?text=${encodeURIComponent(msg)}`;
}

function cardHtml(v, i){
  const foto = v.foto
    ? `<img class="card-foto" src="${v.foto}" alt="${v.modelo}" loading="lazy">`
    : `<div class="card-foto-placeholder"><span>📱</span><small>Foto em breve</small></div>`;

  // Bateria: só mostra chip se >= 80
  const batChip = v.bat >= 80
    ? `<div class="bat-chip"><span class="bat-icon">🔋</span>${v.bat}% bateria</div>`
    : '';

  const preco = R(v.venda)
    ? `<div class="card-preco">${R(v.venda)}</div>`
    : `<div class="card-preco"><span>Consultar preço</span></div>`;

  return `<div class="card" style="animation-delay:${i*.06}s">
    ${foto}
    <div class="card-body">
      <div class="card-modelo">${v.modelo}</div>
      <div class="card-cor">${v.cor}</div>
      ${preco}
      ${batChip}
      <a class="btn-wpp" href="${wppLink(v)}" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Tenho interesse
      </a>
    </div>
  </div>`;
}

async function render(){
  const estoque = await loadEstoque();
  const grid = document.getElementById('grid');
  const badge = document.getElementById('nav-badge');

  if(!estoque.length){
    grid.innerHTML = `<div class="estado" style="grid-column:1/-1">
      <div class="estado-icon">📦</div>
      <div class="estado-txt">Nenhum aparelho disponível no momento</div>
      <div class="estado-sub">Novidades em breve! Entre em contato para ser avisado.</div>
    </div>`;
    badge.textContent = 'Sem estoque';
    badge.style.background = '#fef3cd';
    badge.style.color = '#d97706';
    badge.style.borderColor = '#fde68a';
    return;
  }

  badge.textContent = `${estoque.length} disponíve${estoque.length===1?'l':'is'}`;
  grid.innerHTML = estoque.map((v,i) => cardHtml(v,i)).join('');
}

render();
</script>
</body>
</html>
